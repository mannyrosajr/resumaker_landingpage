<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="gloss" cx="28%" cy="18%" r="58%">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#0C1A4F" flood-opacity="0.40"/>
    </filter>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#gloss)"/>

    <!-- Document: x=192, y=72, w=640, h=880 — slightly smaller than last, content fills page -->
    <g transform="rotate(-4, 512, 500)" filter="url(#shadow)">

      <rect x="192" y="72" width="640" height="880" rx="28" fill="white"/>

      <!-- Header tint -->
