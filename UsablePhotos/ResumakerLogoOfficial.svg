      <rect x="224" y="410" width="126" height="13" rx="6.5" fill="#1D4ED8" opacity="0.32"/>
      <rect x="224" y="436" width="536" height="11" rx="5.5" fill="#CBD5E1"/>
      <rect x="224" y="460" width="406" height="11" rx="5.5" fill="#CBD5E1"/>
